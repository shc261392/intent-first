description: "Evaluate prompt quality across all workflow stages"

# Each test loads its target file via file:// in vars.content.
# The echo provider returns {{content}} verbatim, and assertions check it.
prompts:
  - "{{content}}"

providers:
  - echo

tests:
  # ── Spec ──────────────────────────────────────────────────────────────────
  - description: "Spec prompt has required sections"
    vars:
      content: file://prompts/wf-spec.prompt.md
    assert:
      - type: contains
        value: "Read Intent"
      - type: contains
        value: "Draft Specification"
      - type: contains
        value: "Request Human Approval"
      - type: contains
        value: "Never proceed without human approval"

  - description: "Spec prompt references correct files"
    vars:
      content: file://prompts/wf-spec.prompt.md
    assert:
      - type: contains
        value: "s1_intent.md"
      - type: contains
        value: "s2_spec.md"

  - description: "Spec prompt enforces stage locking"
    vars:
      content: file://prompts/wf-spec.prompt.md
    assert:
      - type: contains
        value: "intent-first lock"

  # ── Plan ──────────────────────────────────────────────────────────────────
  - description: "Plan prompt has required sections"
    vars:
      content: file://prompts/wf-plan.prompt.md
    assert:
      - type: contains
        value: "Review Specification"
      - type: contains
        value: "Research Codebase"
      - type: contains
        value: "Draft Plan"
      - type: contains
        value: "Never proceed without approved spec"

  - description: "Plan prompt references correct files"
    vars:
      content: file://prompts/wf-plan.prompt.md
    assert:
      - type: contains
        value: "s2_spec.md"
      - type: contains
        value: "s3_plan.md"

  - description: "Plan prompt enforces stage locking"
    vars:
      content: file://prompts/wf-plan.prompt.md
    assert:
      - type: contains
        value: "intent-first lock"

  # ── Execution ─────────────────────────────────────────────────────────────
  - description: "Execution prompt has required sections"
    vars:
      content: file://prompts/wf-execution.prompt.md
    assert:
      - type: contains
        value: "Initialize"
      - type: contains
        value: "Handle Issues"
      - type: contains
        value: "Follow plan exactly"
      - type: contains
        value: "human approval"

  - description: "Execution prompt enforces stage locking"
    vars:
      content: file://prompts/wf-execution.prompt.md
    assert:
      - type: contains
        value: "intent-first lock"

  # ── Artifacts ─────────────────────────────────────────────────────────────
  - description: "Artifacts prompt has required sections"
    vars:
      content: file://prompts/wf-artifacts.prompt.md
    assert:
      - type: contains
        value: "Verify Completion"
      - type: contains
        value: "Gather Information"
      - type: contains
        value: "Document Artifacts"
      - type: contains
        value: "Lessons Learned"

  - description: "Artifacts prompt enforces stage locking"
    vars:
      content: file://prompts/wf-artifacts.prompt.md
    assert:
      - type: contains
        value: "intent-first lock"

  # ── YOLO ──────────────────────────────────────────────────────────────────
  - description: "YOLO prompt has required sections"
    vars:
      content: file://prompts/wf-yolo.prompt.md
    assert:
      - type: contains
        value: "YOLO Mode"
      - type: contains
        value: "Auto-approve"
      - type: contains
        value: "YOLO-AUTO"
      - type: contains
        value: "confidence"

  - description: "YOLO prompt enforces pause on low confidence"
    vars:
      content: file://prompts/wf-yolo.prompt.md
    assert:
      - type: contains
        value: "Pause and present to human"
      - type: contains
        value: "Never lower your confidence threshold"

  - description: "YOLO prompt enforces stage locking"
    vars:
      content: file://prompts/wf-yolo.prompt.md
    assert:
      - type: contains
        value: "intent-first lock"

