description: "Evaluate prompt quality across all workflow stages"

# Each test loads its target file via file:// in vars.content.
# The echo provider returns {{content}} verbatim, and assertions check it.
prompts:
  - "{{content}}"

providers:
  - echo

tests:
  # ── Spec ──────────────────────────────────────────────────────────────────
  - description: "Spec prompt has required phase sections"
    vars:
      content: file://prompts/wf-spec.prompt.md
    assert:
      - type: contains
        value: "codebase-explore"
      - type: contains
        value: "intent-mapping"
      - type: contains
        value: "spec-drafting"
      - type: contains
        value: "spec-lock"
      - type: contains
        value: "Never proceed without human approval"

  - description: "Spec prompt references correct files"
    vars:
      content: file://prompts/wf-spec.prompt.md
    assert:
      - type: contains
        value: "s1_intent.md"
      - type: contains
        value: "s2_spec.md"

  - description: "Spec prompt enforces stage locking and phase tracking"
    vars:
      content: file://prompts/wf-spec.prompt.md
    assert:
      - type: contains
        value: "intent-first lock"
      - type: contains
        value: "intent-first phase-update"
      - type: contains
        value: "NO DEFER"

  # ── Plan ──────────────────────────────────────────────────────────────────
  - description: "Plan prompt has required phase sections"
    vars:
      content: file://prompts/wf-plan.prompt.md
    assert:
      - type: contains
        value: "execution-graph-draft"
      - type: contains
        value: "plan-iteration"
      - type: contains
        value: "execution-graph-finalization"
      - type: contains
        value: "plan-lock"

  - description: "Plan prompt references correct files and graph commands"
    vars:
      content: file://prompts/wf-plan.prompt.md
    assert:
      - type: contains
        value: "s2_spec.md"
      - type: contains
        value: "s3_plan.md"
      - type: contains
        value: "execution-graph.json"
      - type: contains
        value: "intent-first graph"

  - description: "Plan prompt enforces stage locking"
    vars:
      content: file://prompts/wf-plan.prompt.md
    assert:
      - type: contains
        value: "intent-first lock"

  # ── Execution ─────────────────────────────────────────────────────────────
  - description: "Execution prompt has required sections"
    vars:
      content: file://prompts/wf-execution.prompt.md
    assert:
      - type: contains
        value: "execution-iteration"
      - type: contains
        value: "execution-lock"
      - type: contains
        value: "graph"
      - type: contains
        value: "approval"

  - description: "Execution prompt enforces stage locking and graph usage"
    vars:
      content: file://prompts/wf-execution.prompt.md
    assert:
      - type: contains
        value: "intent-first lock"
      - type: contains
        value: "intent-first graph"
      - type: contains
        value: "NO DEFER"

  # ── Artifacts ─────────────────────────────────────────────────────────────
  - description: "Artifacts prompt has required phase sections"
    vars:
      content: file://prompts/wf-artifacts.prompt.md
    assert:
      - type: contains
        value: "Verify Completion"
      - type: contains
        value: "artifacts-iteration"
      - type: contains
        value: "new-workflow-spawning"
      - type: contains
        value: "artifacts-lock"
      - type: contains
        value: "Lessons Learned"

  - description: "Artifacts prompt enforces stage locking and spawning"
    vars:
      content: file://prompts/wf-artifacts.prompt.md
    assert:
      - type: contains
        value: "intent-first lock"
      - type: contains
        value: "intent-first spawn"

  # ── YOLO ──────────────────────────────────────────────────────────────────
  - description: "YOLO prompt has required sections"
    vars:
      content: file://prompts/wf-yolo.prompt.md
    assert:
      - type: contains
        value: "YOLO"
      - type: contains
        value: "YOLO-AUTO"
      - type: contains
        value: "confidence"
      - type: contains
        value: "phase-update"

  - description: "YOLO prompt enforces pause on low confidence and NO DEFER"
    vars:
      content: file://prompts/wf-yolo.prompt.md
    assert:
      - type: contains
        value: "PAUSE"
      - type: contains
        value: "Never lower your confidence threshold"
      - type: contains
        value: "NO DEFER"

  - description: "YOLO prompt enforces stage locking"
    vars:
      content: file://prompts/wf-yolo.prompt.md
    assert:
      - type: contains
        value: "intent-first lock"

  # ── Cross-cutting ─────────────────────────────────────────────────────────
  - description: "All prompts use configure instead of git config for user name"
    vars:
      content: file://prompts/wf-spec.prompt.md
    assert:
      - type: contains
        value: "intent-first configure --get name"

