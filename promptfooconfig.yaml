description: "Evaluate prompt quality across all workflow stages"

prompts:
  - file://prompts/wf-spec.prompt.md
  - file://prompts/wf-plan.prompt.md
  - file://prompts/wf-execution.prompt.md
  - file://prompts/wf-artifacts.prompt.md
  - file://prompts/wf-yolo.prompt.md

providers:
  - echo

tests:
  # ── Structure tests: each prompt must contain key sections ──
  - description: "Spec prompt has required sections"
    vars:
      prompt_file: wf-spec.prompt.md
    assert:
      - type: contains
        value: "Read Intent"
      - type: contains
        value: "Draft Specification"
      - type: contains
        value: "Request Human Approval"
      - type: contains
        value: "Never proceed without human approval"

  - description: "Plan prompt has required sections"
    vars:
      prompt_file: wf-plan.prompt.md
    assert:
      - type: contains
        value: "Review Specification"
      - type: contains
        value: "Research Codebase"
      - type: contains
        value: "Draft Plan"
      - type: contains
        value: "Never proceed without approved spec"

  - description: "Execution prompt has required sections"
    vars:
      prompt_file: wf-execution.prompt.md
    assert:
      - type: contains
        value: "Initialize"
      - type: contains
        value: "Handle Issues"
      - type: contains
        value: "Follow plan exactly"

  - description: "Artifacts prompt has required sections"
    vars:
      prompt_file: wf-artifacts.prompt.md
    assert:
      - type: contains
        value: "Verify Completion"
      - type: contains
        value: "Gather Information"
      - type: contains
        value: "Document Artifacts"
      - type: contains
        value: "Lessons Learned"

  # ── Safety guardrails: human-in-the-loop enforcement ──
  - description: "All prompts enforce human approval"
    assert:
      - type: contains
        value: "human approval"

  - description: "All prompts reference stage locking"
    assert:
      - type: contains
        value: "Locked"

  # ── File naming consistency ──
  - description: "Spec prompt references s1_/s2_ filenames"
    vars:
      prompt_file: wf-spec.prompt.md
    assert:
      - type: contains
        value: "s1_intent.md"
      - type: contains
        value: "s2_spec.md"

  - description: "Plan prompt references s2_/s3_ filenames"
    vars:
      prompt_file: wf-plan.prompt.md
    assert:
      - type: contains
        value: "s2_spec.md"
      - type: contains
        value: "s3_plan.md"

  # ── YOLO mode tests ──
  - description: "YOLO prompt has required sections"
    vars:
      prompt_file: wf-yolo.prompt.md
    assert:
      - type: contains
        value: "YOLO Mode"
      - type: contains
        value: "Auto-approve"
      - type: contains
        value: "YOLO-AUTO"
      - type: contains
        value: "confidence"

  - description: "YOLO prompt enforces pause on low confidence"
    vars:
      prompt_file: wf-yolo.prompt.md
    assert:
      - type: contains
        value: "Pause and present to human"
      - type: contains
        value: "Never lower your confidence threshold"
